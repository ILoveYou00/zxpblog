    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="/static/js/tech-bg.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        let currentArticleId = null;
        let sessionId = localStorage.getItem('session_id') || generateSessionId();
        let isLiking = false; // 防止重复点击

        function generateSessionId() {
            const id = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('session_id', id);
            return id;
        }

        // 点赞功能
        document.getElementById('like-btn').addEventListener('click', async function() {
            if (!currentArticleId || isLiking) return;
            isLiking = true;

            try {
                const { response, data } = await api(`/articles/${currentArticleId}/like`, { method: 'POST' });
                if (response.ok) {
                    document.getElementById('like-count').textContent = data.like_count;
                    this.classList.add('liked');
                } else if (data.error === 'Already liked') {
                    const unlikeRes = await api(`/articles/${currentArticleId}/like`, { method: 'DELETE' });
                    if (unlikeRes.response.ok) {
                        document.getElementById('like-count').textContent = unlikeRes.data.like_count;
                        this.classList.remove('liked');
                    }
                }
            } catch (error) {
                console.error('Like failed:', error);
            } finally {
                setTimeout(() => { isLiking = false; }, 300);
            }
        });

        // 收藏功能
        document.getElementById('favorite-btn').addEventListener('click', async function() {
            if (!currentArticleId) return;
            const isFavorited = this.classList.contains('favorited');
            try {
                const method = isFavorited ? 'DELETE' : 'POST';
                const { response } = await api(`/articles/${currentArticleId}/favorite`, {
                    method: method,
                    headers: { 'X-Session-ID': sessionId }
                });
                if (response.ok) {
                    this.classList.toggle('favorited');
                    this.querySelector('span').textContent = this.classList.contains('favorited') ? '已收藏' : '收藏';
                }
            } catch (error) {
                console.error('Favorite failed:', error);
            }
        });

        async function checkLikeFavoriteStatus(articleId) {
            try {
                const [likeRes, favRes] = await Promise.all([
                    api(`/articles/${articleId}/liked`),
                    api(`/articles/${articleId}/favorited`, { headers: { 'X-Session-ID': sessionId } })
                ]);
                if (likeRes.data.liked) {
                    document.getElementById('like-btn').classList.add('liked');
                }
                if (favRes.data.favorited) {
                    document.getElementById('favorite-btn').classList.add('favorited');
                    document.querySelector('#favorite-btn span').textContent = '已收藏';
                }
            } catch (error) {
                console.error('Check status failed:', error);
            }
        }

        async function recordHistory(articleId) {
            try {
                await api('/history', {
                    method: 'POST',
                    headers: { 'X-Session-ID': sessionId },
                    body: JSON.stringify({ article_id: parseInt(articleId) })
                });
            } catch (error) {
                console.error('Record history failed:', error);
            }
        }

        function addCopyButtons() {
            document.querySelectorAll('.article-detail-content pre').forEach(pre => {
                // 检测代码语言
                const codeEl = pre.querySelector('code');
                let lang = '';
                if (codeEl && codeEl.className) {
                    const langMatch = codeEl.className.match(/language-(\w+)/);
                    if (langMatch) {
                        lang = langMatch[1];
                    }
                }
                if (!lang && codeEl && codeEl.classList.length > 0) {
                    for (const cls of codeEl.classList) {
                        if (cls !== 'hljs' && !cls.startsWith('language-')) {
                            lang = cls;
                            break;
                        }
                    }
                }
                if (!lang) lang = 'CODE';

                // 包装器
                pre.style.position = 'relative';

                // 创建复制按钮
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.type = 'button';
                btn.setAttribute('aria-label', '复制代码');
                btn.innerHTML = `
                    <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                `;

                // 使用闭包保存 codeEl 引用
                const codeElement = codeEl;
                const preElement = pre;

                btn.addEventListener('click', async function(e) {
                    e.preventDefault();
                    e.stopPropagation();

                    const codeText = codeElement ? codeElement.textContent : preElement.textContent;

                    try {
                        await navigator.clipboard.writeText(codeText);

                        // 显示成功状态
                        const copyIcon = btn.querySelector('.copy-icon');
                        const checkIcon = btn.querySelector('.check-icon');
                        copyIcon.style.display = 'none';
                        checkIcon.style.display = 'block';
                        btn.classList.add('copied');

                        showToast('代码已复制');

                        setTimeout(() => {
                            copyIcon.style.display = 'block';
                            checkIcon.style.display = 'none';
                            btn.classList.remove('copied');
                        }, 2000);
                    } catch (err) {
                        // 降级方案：使用 execCommand
                        const textarea = document.createElement('textarea');
                        textarea.value = codeText;
                        textarea.style.position = 'fixed';
                        textarea.style.opacity = '0';
                        document.body.appendChild(textarea);
                        textarea.select();
                        try {
                            document.execCommand('copy');
                            showToast('代码已复制');
                        } catch (e) {
                            showToast('复制失败，请手动复制');
                        }
                        document.body.removeChild(textarea);
                    }
                });

                pre.appendChild(btn);
            });
        }

        async function loadRelatedArticles(articleId) {
            try {
                const { data } = await api(`/articles/${articleId}/related`);
                const container = document.getElementById('related-list');
                if (data.data && data.data.length > 0) {
                    container.innerHTML = data.data.map(article => `
                        <a href="/article.html?id=${article.id}" class="related-item">
                            <span class="related-item-title">${article.title}</span>
                            <span class="related-item-date">${new Date(article.created_at).toLocaleDateString('zh-CN')}</span>
                        </a>
                    `).join('');
                } else {
                    document.getElementById('related-articles').style.display = 'none';
                }
            } catch (error) {
                console.error('Load related articles failed:', error);
            }
        }

        function shareToWeibo() {
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(document.title);
            window.open(`https://service.weibo.com/share/share.php?url=${url}&title=${title}`, '_blank');
        }

        function shareToTwitter() {
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(document.title);
            window.open(`https://twitter.com/intent/tweet?url=${url}&text=${title}`, '_blank');
        }

        async function copyLink() {
            const url = window.location.href;
            try {
                // 尝试使用现代 API
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(url);
                    showToast('链接已复制到剪贴板');
                } else {
                    // 降级方案：使用 execCommand
                    const textarea = document.createElement('textarea');
                    textarea.value = url;
                    textarea.style.position = 'fixed';
                    textarea.style.left = '-9999px';
                    textarea.style.top = '0';
                    document.body.appendChild(textarea);
                    textarea.focus();
                    textarea.select();
                    try {
                        document.execCommand('copy');
                        showToast('链接已复制到剪贴板');
                    } catch (err) {
                        showToast('复制失败，请手动复制', 'error');
                    }
                    document.body.removeChild(textarea);
                }
            } catch (err) {
                console.error('Copy failed:', err);
                showToast('复制失败，请手动复制', 'error');
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast-notification toast-success show';
            toast.innerHTML = `<span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // 阅读进度条
        function initReadingProgress() {
            const progressBar = document.getElementById('reading-progress');
            if (!progressBar) return;

            window.addEventListener('scroll', () => {
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const progress = (scrollTop / scrollHeight) * 100;
                progressBar.style.width = progress + '%';
            });
        }

        // 返回顶部按钮
        function initBackToTop() {
            const backToTopBtn = document.getElementById('back-to-top');
            if (!backToTopBtn) return;

            window.addEventListener('scroll', () => {
                if (window.pageYOffset > 300) {
                    backToTopBtn.classList.add('visible');
                } else {
                    backToTopBtn.classList.remove('visible');
                }
            });

            backToTopBtn.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id') || urlParams.get('slug');
            if (articleId) {
                currentArticleId = articleId;
                await loadArticle(articleId);
                await loadComments(articleId);
                await checkLikeFavoriteStatus(articleId);
                await recordHistory(articleId);
                await loadRelatedArticles(articleId);
                addCopyButtons();
                initImageLightbox(); // 初始化图片放大预览
            }

            // 初始化阅读进度条和返回顶部
            initReadingProgress();
            initBackToTop();
        });

        // 图片放大预览功能
        function initImageLightbox() {
            const content = document.querySelector('.article-detail-content');
            if (!content) return;

            const images = content.querySelectorAll('img');
            if (images.length === 0) return;

            // 创建 lightbox 容器
            const lightbox = document.createElement('div');
            lightbox.className = 'image-lightbox';
            lightbox.innerHTML = `
                <button class="image-lightbox-close" aria-label="关闭">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
                <button class="image-lightbox-nav image-lightbox-prev" aria-label="上一张">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <button class="image-lightbox-nav image-lightbox-next" aria-label="下一张">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
                <div class="image-lightbox-counter"></div>
                <img src="" alt="">
            `;
            document.body.appendChild(lightbox);

            const lightboxImg = lightbox.querySelector('img');
            const closeBtn = lightbox.querySelector('.image-lightbox-close');
            const prevBtn = lightbox.querySelector('.image-lightbox-prev');
            const nextBtn = lightbox.querySelector('.image-lightbox-next');
            const counter = lightbox.querySelector('.image-lightbox-counter');

            let currentIndex = 0;

            const showImage = (index) => {
                currentIndex = index;
                lightboxImg.src = images[index].src;
                lightboxImg.alt = images[index].alt || '';
                counter.textContent = `${index + 1} / ${images.length}`;
                prevBtn.style.display = images.length > 1 ? 'flex' : 'none';
                nextBtn.style.display = images.length > 1 ? 'flex' : 'none';
            };

            const openLightbox = (index) => {
                showImage(index);
                lightbox.classList.add('show');
                document.body.style.overflow = 'hidden';
            };

            const closeLightbox = () => {
                lightbox.classList.remove('show');
                document.body.style.overflow = '';
            };

            // 点击图片打开
            images.forEach((img, index) => {
                img.addEventListener('click', () => openLightbox(index));
            });

            // 关闭按钮
            closeBtn.addEventListener('click', closeLightbox);

            // 点击背景关闭
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });

            // 上一张/下一张
            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showImage((currentIndex - 1 + images.length) % images.length);
            });

            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showImage((currentIndex + 1) % images.length);
            });

            // 键盘控制
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('show')) return;
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') showImage((currentIndex - 1 + images.length) % images.length);
                if (e.key === 'ArrowRight') showImage((currentIndex + 1) % images.length);
            });
        }
    </script>
</body>
</html>
