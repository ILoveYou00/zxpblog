<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Viewer - Tech Blog</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #64748b;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #ef4444;
            text-align: center;
            padding: 20px;
        }

        .error-container svg {
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .error-container p {
            margin-bottom: 16px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #4f46e5;
        }

        /* HTML 内容容器 - 用于渲染导入的 HTML */
        #html-content {
            width: 100%;
            min-height: 100vh;
        }

        /* 如果导入的 HTML 有自己的样式，让它完全覆盖页面 */
        #html-content.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div class="loading-container" id="loading">
        <div class="loading-spinner"></div>
        <p>加载中...</p>
    </div>

    <div class="error-container hidden" id="error">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <p id="error-message">加载失败</p>
        <a href="/" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            返回首页
        </a>
    </div>

    <div id="html-content"></div>

    <script>
        const API_BASE = '/api';

        async function api(endpoint, options = {}) {
            const defaults = {
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'include'
            };

            const response = await fetch(`${API_BASE}${endpoint}`, {
                ...defaults,
                ...options,
                headers: {
                    ...defaults.headers,
                    ...options.headers
                }
            });

            const data = await response.json();
            return { response, data };
        }

        async function loadHtmlPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) {
                showError('缺少页面ID参数');
                return;
            }

            try {
                const { data } = await api(`/html-pages/${id}`);
                const htmlPage = data.data;

                // 更新页面标题
                document.title = htmlPage.title + ' - Tech Blog';

                // 隐藏加载状态
                document.getElementById('loading').style.display = 'none';

                // 渲染 HTML 内容
                const contentContainer = document.getElementById('html-content');

                // 解析并渲染 HTML
                // 如果内容是完整的 HTML 文档（包含 <html> 标签），则替换整个文档
                if (htmlPage.content && htmlPage.content.includes('<html')) {
                    // 使用 document.write 或创建新文档
                    document.open();
                    document.write(htmlPage.content);
                    document.close();
                } else if (htmlPage.content && htmlPage.content.includes('<body')) {
                    // 如果包含 body 标签，提取 body 内容
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlPage.content, 'text/html');
                    const bodyContent = doc.body.innerHTML;

                    // 提取并应用 head 中的样式
                    const headStyles = doc.head.querySelectorAll('style, link[rel="stylesheet"]');
                    headStyles.forEach(style => {
                        document.head.appendChild(style.cloneNode(true));
                    });

                    contentContainer.innerHTML = bodyContent;
                    contentContainer.classList.add('fullscreen');
                } else {
                    // 普通 HTML 片段，直接渲染
                    contentContainer.innerHTML = htmlPage.content || '';
                    contentContainer.classList.add('fullscreen');
                }

            } catch (error) {
                console.error('Failed to load HTML page:', error);
                showError('页面加载失败，请检查链接是否正确');
            }
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('error-message').textContent = message;
        }

        // 页面加载完成后执行
        loadHtmlPage();
    </script>
</body>
</html>
